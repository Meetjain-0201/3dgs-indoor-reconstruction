<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3dgs indoor scenes</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #0a0a0f;
        color: #d6d6db;
        font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, "Courier New", monospace;
        font-size: 14px;
      }
      header {
        padding: 2.5rem 3rem 1.5rem;
        border-bottom: 1px solid #1e1e28;
      }
      header .brand {
        font-size: 0.7rem;
        color: #6c6c7a;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 0.4rem;
      }
      header h1 {
        font-size: 1.15rem;
        font-weight: 500;
        margin: 0 0 0.35rem;
        color: #e8e8ee;
        letter-spacing: 0.02em;
      }
      header p {
        font-size: 0.8rem;
        margin: 0;
        color: #6c6c7a;
      }
      main {
        padding: 2rem 3rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 0.85rem;
        max-width: 1100px;
      }
      a.scene-card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: #121218;
        border: 1px solid #1e1e28;
        padding: 1.25rem 1.25rem 1.5rem;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      }
      a.scene-card:hover {
        background: #181823;
        border-color: #2a2a38;
        transform: translateY(-1px);
      }
      a.scene-card .label {
        font-size: 0.65rem;
        color: #6c6c7a;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      a.scene-card .name {
        font-size: 1.05rem;
        color: #e8e8ee;
      }
      footer {
        padding: 1.5rem 3rem;
        font-size: 0.7rem;
        color: #4a4a55;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">3dgs indoor reconstruction</div>
      <h1>scenes</h1>
      <p>pick a scene to launch the viewer</p>
    </header>
    <main id="scene-list"></main>
    <footer>cs5330 final project</footer>
    <script type="module">
      const scenes = ['bedroom', 'workspace'];
      const list = document.getElementById('scene-list');
      for (const name of scenes) {
        const card = document.createElement('a');
        card.className = 'scene-card';
        card.href = `viewer.html?scene=${encodeURIComponent(name)}`;
        card.innerHTML = `
          <div class="label">scene</div>
          <div class="name">${name}</div>
        `;
        list.appendChild(card);
      }
    </script>
  </body>
</html>
