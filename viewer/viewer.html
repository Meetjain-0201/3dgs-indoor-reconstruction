<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3dgs viewer</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #0a0a0f;
        color: #d6d6db;
        font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, "Courier New", monospace;
      }

      #canvas-root {
        position: fixed;
        inset: 0;
      }
      #canvas-root canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      .hud {
        position: fixed;
        font-size: 0.75rem;
        letter-spacing: 0.03em;
        pointer-events: none;
        background: rgba(18, 18, 24, 0.72);
        border: 1px solid #1e1e28;
        padding: 0.4rem 0.65rem;
      }
      .hud .label { color: #6c6c7a; }
      .hud .value, .hud .name { color: #e8e8ee; margin-left: 0.35rem; }

      #hud-scene { top: 0.75rem; left: 1rem; }
      #hud-fps   { top: 0.75rem; right: 1rem; min-width: 5.25rem; text-align: right; }

      #hud-controls {
        bottom: 3.25rem;
        left: 1rem;
        line-height: 1.55;
      }
      #hud-controls .row { color: #b5b5bd; }
      #hud-controls .key {
        display: inline-block;
        min-width: 5.25rem;
        color: #e8e8ee;
      }

      #loading {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2.4rem;
        background: #0a0a0f;
        border-top: 1px solid #1e1e28;
      }
      #loading-fill {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 0%;
        background: #2a2a38;
        transition: width 120ms linear;
      }
      #loading-text {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        color: #e8e8ee;
        letter-spacing: 0.04em;
      }
      #loading.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="canvas-root"></div>

    <div class="hud" id="hud-scene">
      <span class="label">scene</span><span class="name" id="scene-name"></span>
    </div>

    <div class="hud" id="hud-fps">
      <span class="label">fps</span><span class="value" id="fps-value">--</span>
    </div>

    <div class="hud" id="hud-controls">
      <div class="row"><span class="key">drag</span>orbit</div>
      <div class="row"><span class="key">scroll</span>zoom</div>
      <div class="row"><span class="key">right-drag</span>pan</div>
      <div class="row"><span class="key">wasd</span>fly</div>
    </div>

    <div id="loading">
      <div id="loading-fill"></div>
      <div id="loading-text">loading... 0%</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
